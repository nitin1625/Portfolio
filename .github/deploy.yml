name: Deploy Portfolio to GitHub Pages

# TRIGGER: runs on every push to main branch
on:
  push:
    branches: [main]

# PERMISSIONS: needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ─── JOB 1: Validate data.json ───────────────────────────────────────────────
  validate:
    name: Validate data.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          echo "Checking data.json is valid JSON..."
          python3 -c "import json; json.load(open('data.json')); print('✅ data.json is valid!')"

      - name: Check required fields
        run: |
          python3 - <<'EOF'
          import json, sys

          with open('data.json') as f:
              data = json.load(f)

          required = ['name', 'title', 'about', 'projects', 'services', 'experience']
          missing = [k for k in required if k not in data]

          if missing:
              print(f"❌ Missing required fields: {missing}")
              sys.exit(1)

          print(f"✅ All required fields present: {required}")
          EOF

  # ─── JOB 2: Run Lighthouse CI (performance audit) ────────────────────────────
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: validate         # only runs if validate passes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://YOUR_USERNAME.github.io/portfolio/
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true   # don't block deploy if audit fails

  # ─── JOB 3: Deploy ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate           # only deploy if validation passes
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'           # deploy the whole repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment success
        run: echo "✅ Portfolio deployed to ${{ steps.deployment.outputs.page_url }}"
