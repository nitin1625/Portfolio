name: Auto-Update "Last Updated" Badge

# TRIGGER: runs whenever you push to main
on:
  push:
    branches: [main]

jobs:
  update-badge:
    name: Update last-updated timestamp in HTML
    runs-on: ubuntu-latest

    # PERMISSION: needs write access to commit back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update last-updated date in index.html
        run: |
          CURRENT_DATE=$(date -u '+%B %d, %Y')
          echo "Setting last updated to: $CURRENT_DATE"

          # Replace the placeholder date in the footer
          sed -i "s/Last updated: [A-Za-z]* [0-9]*, [0-9]*/Last updated: $CURRENT_DATE/" index.html

          echo "✅ Updated last-updated date"

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          git diff --quiet index.html || (
            git add index.html
            git commit -m "chore: auto-update last-updated date [skip ci]"
            git push
          )

          echo "✅ Done"
