<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Loading...</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --ff-display: 'Syne', 'Trebuchet MS', sans-serif;
  --ff-mono: 'DM Mono', 'Courier New', monospace;
  --ff-body: 'DM Sans', 'Segoe UI', sans-serif;
  --bg:  #060810; --bg2: #0d1017; --bg3: #131722; --surface: #1a1f2e;
  --border: rgba(255,255,255,0.06); --borderh: rgba(99,214,168,0.3);
  --text: #dde2f0; --muted: #606880; --dim: #3a4055;
  --g: #63d6a8; --b: #4fb8f0; --y: #f0c84b; --r: #f06b6b;
  --glow: 0 0 40px rgba(99,214,168,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--ff-body); font-size: 16px; line-height: 1.7; overflow-x: hidden; cursor: none; }

/* LOADER */
#loader {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  transition: opacity 0.4s, visibility 0.4s;
}
#loader.hide { opacity: 0; visibility: hidden; }
.loader-logo { font-family: var(--ff-display); font-size: 28px; font-weight: 800; color: var(--text); }
.loader-logo span { color: var(--g); }
.loader-bar { width: 160px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.loader-bar::after { content: ''; display: block; height: 100%; width: 0; background: var(--g); animation: load 0.8s ease forwards; }
@keyframes load { to { width: 100%; } }

/* CURSOR */
#cursor { position: fixed; z-index: 9999; width: 10px; height: 10px; background: var(--g); border-radius: 50%; pointer-events: none; transform: translate(-50%,-50%); mix-blend-mode: difference; }
#cursor-ring { position: fixed; z-index: 9998; width: 36px; height: 36px; border: 1px solid rgba(99,214,168,0.4); border-radius: 50%; pointer-events: none; transform: translate(-50%,-50%); transition: width 0.2s, height 0.2s, opacity 0.2s; }

/* GRID BG */
body::before { content: ''; position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(99,214,168,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(99,214,168,0.025) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }

/* NAV */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 56px; background: rgba(6,8,16,0.88); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); }
.nav-logo { font-family: var(--ff-display); font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); text-decoration: none; }
.nav-logo span { color: var(--g); }
.nav-links { display: flex; gap: 32px; list-style: none; }
.nav-links a { font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover { color: var(--g); }
.nav-btn { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 9px 22px; background: transparent; border: 1px solid var(--g); border-radius: 6px; color: var(--g); text-decoration: none; transition: background 0.2s, color 0.2s; }
.nav-btn:hover { background: var(--g); color: var(--bg); }

/* LAYOUT */
section { position: relative; z-index: 1; }
.container { max-width: 1100px; margin: 0 auto; padding: 0 56px; }
.sec { padding: 120px 0; }
.tag-label { display: inline-block; font-family: var(--ff-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--g); margin-bottom: 16px; }
.tag-label::before { content: '// '; opacity: 0.5; }
h2.heading { font-family: var(--ff-display); font-size: clamp(36px, 4.5vw, 58px); font-weight: 800; letter-spacing: -2px; line-height: 1.05; margin-bottom: 20px; }
.subtext { font-size: 16px; color: var(--muted); max-width: 500px; line-height: 1.85; }

/* HERO */
#hero { min-height: 100vh; display: flex; align-items: center; padding-top: 80px; }
.hero-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; width: 100%; }
.status-pill { display: inline-flex; align-items: center; gap: 8px; font-family: var(--ff-mono); font-size: 11px; letter-spacing: 0.08em; color: var(--g); background: rgba(99,214,168,0.07); border: 1px solid rgba(99,214,168,0.18); border-radius: 20px; padding: 7px 16px; margin-bottom: 32px; }
.s-dot { width: 7px; height: 7px; background: var(--g); border-radius: 50%; animation: breathe 2s ease-in-out infinite; }
@keyframes breathe { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(99,214,168,0.4)} 50%{opacity:.6;box-shadow:0 0 0 5px rgba(99,214,168,0)} }
.hero-title { font-family: var(--ff-display); font-size: clamp(52px, 6vw, 82px); font-weight: 800; letter-spacing: -3px; line-height: 1.0; margin-bottom: 28px; }
.hero-title .acc { color: var(--g); }
.hero-title .dm { color: var(--dim); }
.hero-desc { font-size: 17px; color: var(--muted); line-height: 1.85; max-width: 440px; margin-bottom: 44px; }
.hero-desc strong { color: var(--text); font-weight: 500; }
.hero-btns { display: flex; gap: 14px; flex-wrap: wrap; }
.btn-p { display: inline-flex; align-items: center; gap: 8px; padding: 14px 30px; background: var(--g); color: var(--bg); font-family: var(--ff-body); font-size: 14px; font-weight: 600; border-radius: 8px; text-decoration: none; border: none; transition: opacity 0.2s, transform 0.15s; cursor: pointer; }
.btn-p:hover { opacity: .85; transform: translateY(-2px); }
.btn-o { display: inline-flex; align-items: center; gap: 8px; padding: 14px 30px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: var(--ff-body); font-size: 14px; font-weight: 500; border-radius: 8px; text-decoration: none; transition: border-color 0.2s, color 0.2s; }
.btn-o:hover { border-color: var(--g); color: var(--g); }

/* TERMINAL */
.terminal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; font-family: var(--ff-mono); font-size: 13px; box-shadow: var(--glow), 0 40px 80px rgba(0,0,0,.5); }
.t-bar { background: var(--bg3); padding: 12px 16px; display: flex; align-items: center; gap: 7px; border-bottom: 1px solid var(--border); }
.dot { width: 11px; height: 11px; border-radius: 50%; }
.dr{background:#f06b6b;} .dy{background:#f0c84b;} .dg{background:var(--g);}
.t-title { margin-left: 8px; font-size: 12px; color: var(--muted); }
.t-body { padding: 22px 26px; line-height: 2; }
.t-line { margin-bottom: 1px; }
.tp{color:var(--g);} .tc{color:var(--text);} .to{color:var(--muted);padding-left:14px;}
.tk{color:var(--b);} .tv{color:var(--y);} .ts-c{color:var(--g);}
.tcursor { display: inline-block; width: 8px; height: 14px; background: var(--g); vertical-align: middle; margin-left: 2px; animation: blink 1.1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* COUNTERS */
.counters { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-top: 80px; }
.counter-item { background: var(--bg2); padding: 32px 28px; text-align: center; transition: background 0.2s; }
.counter-item:hover { background: var(--bg3); }
.c-num { font-family: var(--ff-display); font-size: 42px; font-weight: 800; letter-spacing: -2px; line-height: 1; margin-bottom: 8px; }
.cg{color:var(--g);} .cb{color:var(--b);} .cy{color:var(--y);}
.c-lbl { font-family: var(--ff-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; line-height: 1.5; }

/* ABOUT */
#about { background: var(--bg2); }
.about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
.about-body p { color: var(--muted); line-height: 1.9; margin-bottom: 18px; font-size: 15px; }
.about-body p strong { color: var(--text); font-weight: 500; }
.skill-blocks { display: flex; flex-direction: column; gap: 14px; }
.skill-block { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; transition: border-color 0.2s; }
.skill-block:hover { border-color: var(--borderh); }
.sb-title { font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.stags { display: flex; flex-wrap: wrap; gap: 7px; }
.stag { font-family: var(--ff-mono); font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 5px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text); transition: border-color 0.2s, color 0.2s; cursor: default; }
.stag:hover { border-color: var(--g); color: var(--g); }
.stag.hi { background: rgba(99,214,168,0.07); border-color: rgba(99,214,168,0.2); color: var(--g); }

/* IMPACT */
#impact { background: var(--bg); }
.impact-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-bottom: 56px; }
.impact-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 36px 28px; position: relative; overflow: hidden; transition: border-color 0.3s, transform 0.25s; }
.impact-card:hover { border-color: var(--borderh); transform: translateY(-5px); }
.impact-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg,var(--g),var(--b)); transform: scaleX(0); transform-origin: left; transition: transform 0.4s; }
.impact-card:hover::after { transform: scaleX(1); }
.impact-num { font-family: var(--ff-display); font-size: 52px; font-weight: 800; letter-spacing: -2px; line-height: 1; margin-bottom: 10px; }
.impact-num.g{color:var(--g);} .impact-num.b{color:var(--b);} .impact-num.y{color:var(--y);}
.impact-desc strong { display: block; font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.impact-desc span { font-size: 13px; color: var(--muted); line-height: 1.6; }
.why-box { background: var(--bg2); border: 1px solid rgba(99,214,168,0.18); border-radius: 16px; padding: 52px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; position: relative; overflow: hidden; }
.why-box::before { content: ''; position: absolute; bottom: -80px; right: -80px; width: 300px; height: 300px; background: radial-gradient(circle,rgba(99,214,168,.06) 0%,transparent 65%); pointer-events: none; }
.why-title { font-family: var(--ff-display); font-size: 26px; font-weight: 800; letter-spacing: -0.8px; line-height: 1.2; margin-bottom: 28px; }
.why-title span { color: var(--g); }
.why-pts { list-style: none; display: flex; flex-direction: column; gap: 16px; }
.why-pts li { font-size: 14px; color: var(--muted); line-height: 1.7; padding-left: 20px; position: relative; }
.why-pts li::before { content: '›'; position: absolute; left: 0; color: var(--g); font-size: 16px; line-height: 1.5; }
.why-pts li strong { color: var(--text); font-weight: 500; }
.trust-list { display: flex; flex-direction: column; gap: 14px; }
.trust-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; display: flex; align-items: center; gap: 14px; transition: border-color 0.2s, transform 0.2s; }
.trust-item:hover { border-color: var(--b); transform: translateX(4px); }
.ti-icon { font-size: 20px; width: 42px; height: 42px; background: rgba(79,184,240,0.08); border: 1px solid rgba(79,184,240,0.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ti-copy strong { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.ti-copy span { font-size: 12px; color: var(--muted); }

/* SERVICES */
#services { background: var(--bg2); }
.svc-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
.svc-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 32px 26px; transition: border-color 0.3s, transform 0.2s; }
.svc-card:hover { border-color: var(--borderh); transform: translateY(-3px); }
.svc-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 18px; }
.ig{background:rgba(99,214,168,.08);border:1px solid rgba(99,214,168,.18);}
.ib{background:rgba(79,184,240,.08);border:1px solid rgba(79,184,240,.18);}
.iy{background:rgba(240,200,75,.08);border:1px solid rgba(240,200,75,.18);}
.svc-name { font-family: var(--ff-display); font-size: 17px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 10px; }
.svc-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 18px; }
.svc-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.svc-tag { font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.05em; padding: 3px 9px; border-radius: 4px; background: rgba(255,255,255,.03); border: 1px solid var(--border); color: var(--muted); }

/* PROJECTS */
#projects { background: var(--bg); }
.proj-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 24px; }
.proj-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 36px; display: flex; flex-direction: column; gap: 14px; transition: border-color 0.3s; }
.proj-card:hover { border-color: rgba(99,214,168,.25); }
.proj-card.wide { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
.proj-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.pbadge { font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; }
.pp{background:rgba(99,214,168,.1);color:var(--g);border:1px solid rgba(99,214,168,.2);}
.po{background:rgba(79,184,240,.1);color:var(--b);border:1px solid rgba(79,184,240,.2);}
.proj-name { font-family: var(--ff-display); font-size: 21px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; }
.proj-desc { font-size: 14px; color: var(--muted); line-height: 1.75; }
.proj-impact { background: rgba(99,214,168,.05); border: 1px solid rgba(99,214,168,.12); border-radius: 8px; padding: 14px 16px; }
.pil { font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--g); margin-bottom: 5px; }
.pit { font-size: 13px; color: var(--text); line-height: 1.6; }
.proj-stack { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
.stk { font-family: var(--ff-mono); font-size: 11px; padding: 4px 10px; border-radius: 4px; background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
.proj-links { display: flex; gap: 12px; margin-top: 4px; }
.proj-link { font-family: var(--ff-mono); font-size: 11px; color: var(--g); text-decoration: none; display: flex; align-items: center; gap: 4px; transition: opacity 0.2s; }
.proj-link:hover { opacity: 0.7; }

/* EXPERIENCE */
#experience { background: var(--bg2); }
.timeline { padding-left: 28px; position: relative; }
.timeline::before { content: ''; position: absolute; left: 0; top: 6px; bottom: 6px; width: 1px; background: var(--border); }
.tl-item { position: relative; margin-bottom: 56px; }
.tl-item:last-child { margin-bottom: 0; }
.tl-dot { position: absolute; left: -32px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--g); border: 2px solid var(--bg2); box-shadow: 0 0 0 3px rgba(99,214,168,.18); }
.tl-dot.dm { background: var(--muted); box-shadow: 0 0 0 3px rgba(96,104,128,.15); }
.tl-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; margin-bottom: 6px; }
.tl-role { font-family: var(--ff-display); font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
.tl-period { font-family: var(--ff-mono); font-size: 11px; color: var(--muted); background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; white-space: nowrap; }
.tl-company { font-family: var(--ff-mono); font-size: 13px; color: var(--g); margin-bottom: 16px; }
.tl-buls { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.tl-buls li { font-size: 14px; color: var(--muted); line-height: 1.75; padding-left: 18px; position: relative; }
.tl-buls li::before { content: '▸'; position: absolute; left: 0; top: 4px; color: var(--g); font-size: 10px; }
.tl-buls li strong { color: var(--text); font-weight: 500; }

/* CONTACT */
#contact { background: var(--bg); }
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
.ctitle { font-family: var(--ff-display); font-size: 30px; font-weight: 800; letter-spacing: -1px; line-height: 1.2; margin-bottom: 12px; }
.clinks { display: flex; flex-direction: column; gap: 10px; margin-top: 32px; }
.clink { display: flex; align-items: center; gap: 14px; padding: 15px 18px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; text-decoration: none; color: var(--text); font-size: 14px; transition: border-color 0.2s, transform 0.2s; }
.clink:hover { border-color: var(--g); transform: translateX(5px); }
.ci { font-size: 16px; width: 20px; text-align: center; }
.clbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
.cform { display: flex; flex-direction: column; gap: 14px; }
.fg { display: flex; flex-direction: column; gap: 6px; }
.fl { font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.fi, .fta { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 13px 15px; color: var(--text); font-family: var(--ff-body); font-size: 14px; outline: none; transition: border-color 0.2s; resize: none; }
.fi:focus, .fta:focus { border-color: var(--g); }
.fta { min-height: 110px; }

/* FOOTER */
footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 28px 56px; display: flex; justify-content: space-between; align-items: center; font-family: var(--ff-mono); font-size: 12px; color: var(--muted); position: relative; z-index: 1; }
footer a { color: var(--g); text-decoration: none; }

/* REVEAL */
.reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.65s ease, transform 0.65s ease; }
.reveal.show { opacity: 1; transform: translateY(0); }
.d1{transition-delay:.1s;} .d2{transition-delay:.2s;} .d3{transition-delay:.3s;}

/* RESPONSIVE */
@media (max-width: 900px) {
  nav { padding: 16px 24px; }
  .nav-links { display: none; }
  .container { padding: 0 24px; }
  .hero-inner, .about-grid, .contact-grid, .why-box { grid-template-columns: 1fr; gap: 40px; }
  .impact-cards, .svc-grid { grid-template-columns: 1fr 1fr; }
  .proj-grid { grid-template-columns: 1fr; }
  .proj-card.wide { grid-column: span 1; grid-template-columns: 1fr; gap: 20px; }
  .counters { grid-template-columns: repeat(2,1fr); }
  footer { flex-direction: column; gap: 10px; text-align: center; }
}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loader">
  <div class="loader-logo">nitin<span>.</span>dev</div>
  <div class="loader-bar"></div>
</div>

<!-- Custom cursor -->
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- NAV (shell — filled by JS) -->
<nav>
  <a href="#hero" class="nav-logo">nitin<span>.</span>dev</a>
  <ul class="nav-links" id="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#impact">Impact</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#experience">Experience</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <a href="#contact" class="nav-btn">Let's Talk</a>
</nav>

<!-- All sections are empty shells — JS fills them from data.json -->
<section id="hero"><div class="container" id="hero-content"></div></section>
<section id="about"><div class="container sec" id="about-content"></div></section>
<section id="impact"><div class="container sec" id="impact-content"></div></section>
<section id="services"><div class="container sec" id="services-content"></div></section>
<section id="projects"><div class="container sec" id="projects-content"></div></section>
<section id="experience"><div class="container sec" id="experience-content"></div></section>
<section id="contact"><div class="container sec" id="contact-content"></div></section>
<footer id="footer-content"></footer>

<script>
// ─── CURSOR ───────────────────────────────────────────────────
const cur = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function anim(){
  cur.style.left=mx+'px'; cur.style.top=my+'px';
  rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(anim);
})();

// ─── HELPERS ──────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const h = (tag, cls, html, attrs='') => `<${tag} ${cls?`class="${cls}"`:''} ${attrs}>${html}</${tag}>`;

// ─── BUILDERS — each fn takes data and returns HTML string ────

function buildHero(d) {
  const meta = d.meta;
  const termLines = [
    `<div class="t-line"><span class="tp">❯ </span><span class="tc">cat profile.json</span></div>`,
    `<div class="t-line" style="margin-top:10px"><span class="to">{</span></div>`,
    `<div class="t-line"><span class="to">&nbsp;&nbsp;<span class="tk">"name"</span>: <span class="ts-c">"${meta.name}"</span>,</span></div>`,
    `<div class="t-line"><span class="to">&nbsp;&nbsp;<span class="tk">"role"</span>: <span class="ts-c">"${meta.role}"</span>,</span></div>`,
    `<div class="t-line"><span class="to">&nbsp;&nbsp;<span class="tk">"location"</span>: <span class="ts-c">"${meta.location}"</span></span></div>`,
    `<div class="t-line"><span class="to">}</span></div>`,
    `<div class="t-line" style="margin-top:12px"><span class="tp">❯ </span><span class="tcursor"></span></div>`
  ].join('');

  const counters = (d.counters||[]).map(c => `
    <div class="counter-item">
      <div class="c-num ${c.color}" ${c.animated?`data-target="${c.target}" data-suffix="${c.suffix}"`:''}>${c.value}</div>
      <div class="c-lbl">${c.label.replace('\n','<br/>')}</div>
    </div>`).join('');

  return `
    <div class="hero-inner" style="padding-top:40px">
      <div>
        ${meta.available ? `<div class="status-pill"><span class="s-dot"></span>${meta.availableText}</div>` : ''}
        <h1 class="hero-title">
          Building AI<br/>
          <span class="acc">that ships</span><br/>
          <span class="dm">to production.</span>
        </h1>
        <p class="hero-desc">${meta.heroDesc}</p>
        <div class="hero-btns">
          <a href="#projects" class="btn-p">See My Work →</a>
          <a href="#contact" class="btn-o">Get in Touch</a>
        </div>
      </div>
      <div>
        <div class="terminal">
          <div class="t-bar">
            <span class="dot dr"></span><span class="dot dy"></span><span class="dot dg"></span>
            <span class="t-title">${meta.name.toLowerCase().replace(' ','.')}@dev ~ profile.json</span>
          </div>
          <div class="t-body">${termLines}</div>
        </div>
      </div>
    </div>
    <div class="counters reveal">${counters}</div>`;
}

function buildAbout(d) {
  const a = d.about;
  const paras = (a.paragraphs||[]).map(p=>`<p>${p}</p>`).join('');
  const groups = (a.skillGroups||[]).map(g=>{
    const tags = (g.skills||[]).map(s=>`<span class="stag ${s.highlight?'hi':''}">${s.name}</span>`).join('');
    return `<div class="skill-block"><div class="sb-title">${g.title}</div><div class="stags">${tags}</div></div>`;
  }).join('');
  return `
    <div class="about-grid">
      <div class="reveal">
        <span class="tag-label">About</span>
        <h2 class="heading">Code that does<br/>the heavy lifting.</h2>
        <div class="about-body">${paras}</div>
      </div>
      <div class="skill-blocks reveal d1">${groups}</div>
    </div>`;
}

function buildImpact(d) {
  const imp = d.impact;
  const cards = (imp.cards||[]).map((c,i)=>`
    <div class="impact-card reveal ${i>0?'d'+i:''}">
      <div class="impact-num ${c.color}">${c.metric}</div>
      <div class="impact-desc"><strong>${c.title}</strong><span>${c.desc}</span></div>
    </div>`).join('');
  const pts = (imp.whyPoints||[]).map(p=>`<li>${p}</li>`).join('');
  const trust = (imp.trustItems||[]).map(t=>`
    <div class="trust-item">
      <div class="ti-icon">${t.icon}</div>
      <div class="ti-copy"><strong>${t.title}</strong><span>${t.desc}</span></div>
    </div>`).join('');
  return `
    <div class="reveal" style="margin-bottom:60px">
      <span class="tag-label">Impact &amp; Why Me</span>
      <h2 class="heading">Real results.<br/>Not just code.</h2>
      <p class="subtext">Every project I've worked on has a measurable business outcome attached to it.</p>
    </div>
    <div class="impact-cards">${cards}</div>
    <div class="why-box reveal">
      <div>
        <h3 class="why-title">Why hire me over someone with a<br/><span>better college or more years?</span></h3>
        <ul class="why-pts">${pts}</ul>
      </div>
      <div class="trust-list">${trust}</div>
    </div>`;
}

function buildServices(d) {
  const cards = (d.services||[]).map((s,i)=>`
    <div class="svc-card reveal ${i%3>0?'d'+(i%3):''}">
      <div class="svc-icon ${s.iconClass}">${s.icon}</div>
      <div class="svc-name">${s.name}</div>
      <p class="svc-desc">${s.desc}</p>
      <div class="svc-tags">${(s.tags||[]).map(t=>`<span class="svc-tag">${t}</span>`).join('')}</div>
    </div>`).join('');
  return `
    <div class="reveal" style="margin-bottom:56px">
      <span class="tag-label">Services</span>
      <h2 class="heading">What I build<br/>for you.</h2>
      <p class="subtext">From "we need AI for this" to live systems. No fluff, no vendor lock-in.</p>
    </div>
    <div class="svc-grid">${cards}</div>`;
}

function buildProjects(d) {
  const cards = (d.projects||[]).map((p,i)=>{
    const links = [
      p.liveUrl ? `<a href="${p.liveUrl}" target="_blank" class="proj-link">↗ Live</a>` : '',
      p.githubUrl ? `<a href="${p.githubUrl}" target="_blank" class="proj-link">⌥ GitHub</a>` : ''
    ].filter(Boolean).join('');
    const stack = (p.stack||[]).map(s=>`<span class="stk">${s}</span>`).join('');
    const inner = `
      <div>
        <div class="proj-meta"><span class="pbadge ${p.badgeClass}">${p.type} · ${p.company}</span></div>
        <h3 class="proj-name">${p.name}</h3>
        <p class="proj-desc">${p.desc}</p>
        <div class="proj-impact"><div class="pil">↑ Impact</div><div class="pit">${p.impact}</div></div>
        ${links ? `<div class="proj-links">${links}</div>` : ''}
      </div>
      <div><div class="proj-stack">${stack}</div></div>`;
    return `<div class="proj-card ${p.featured?'wide':''} reveal ${i%2>0&&!p.featured?'d1':''}">${inner}</div>`;
  }).join('');
  return `
    <div class="reveal" style="margin-bottom:56px">
      <span class="tag-label">Projects</span>
      <h2 class="heading">Things I've<br/>actually shipped.</h2>
      <p class="subtext">Production systems with real business outcomes — not side projects.</p>
    </div>
    <div class="proj-grid">${cards}</div>`;
}

function buildExperience(d) {
  const items = (d.experience||[]).map(e=>`
    <div class="tl-item reveal">
      <div class="tl-dot ${e.dim?'dm':''}"></div>
      <div class="tl-head">
        <div><div class="tl-role">${e.role}</div><div class="tl-company">${e.company}</div></div>
        <span class="tl-period">${e.period}</span>
      </div>
      <ul class="tl-buls">${(e.bullets||[]).map(b=>`<li>${b}</li>`).join('')}</ul>
    </div>`).join('');
  return `
    <div class="reveal" style="margin-bottom:56px">
      <span class="tag-label">Experience</span>
      <h2 class="heading">Where I've<br/>built things.</h2>
    </div>
    <div class="timeline">${items}</div>`;
}

function buildContact(d) {
  const m = d.meta;
  const links = [
    { icon:'✉️', href:`mailto:${m.email}`,  val: m.email,   lbl:'Email' },
    { icon:'💼', href: m.linkedin, target:true, val:'LinkedIn',         lbl:'Connect professionally' },
    { icon:'🐙', href: m.github,  target:true, val: m.github.replace('https://',''), lbl:'See what I\'m building' },
    { icon:'📱', href:`tel:${m.phone}`,       val: m.phone,  lbl: m.location }
  ].map(l=>`
    <a href="${l.href}" ${l.target?'target="_blank"':''} class="clink">
      <span class="ci">${l.icon}</span>
      <div><div>${l.val}</div><div class="clbl">${l.lbl}</div></div>
    </a>`).join('');
  return `
    <div class="contact-grid">
      <div class="reveal">
        <span class="tag-label">Contact</span>
        <h2 class="ctitle">Let's build<br/>something great.</h2>
        <p class="subtext">Open to full-time roles, contract work, and interesting AI problems. I respond fast.</p>
        <div class="clinks">${links}</div>
      </div>
      <div class="reveal d1">
        <form class="cform" onsubmit="handleForm(event)">
          <div class="fg"><label class="fl">Your Name</label><input type="text" class="fi" placeholder="Jane Smith" required/></div>
          <div class="fg"><label class="fl">Email</label><input type="email" class="fi" placeholder="jane@company.com" required/></div>
          <div class="fg"><label class="fl">What are you looking for?</label><input type="text" class="fi" placeholder="Full-time hire, contract, collaboration..."/></div>
          <div class="fg"><label class="fl">Message</label><textarea class="fta" placeholder="Tell me about the problem you're trying to solve..." required></textarea></div>
          <button type="submit" class="btn-p" style="width:fit-content">Send Message →</button>
        </form>
      </div>
    </div>`;
}

function buildFooter(d) {
  const m = d.meta;
  return `
    <span>© 2026 ${m.name} — <a href="${m.github}">View source on GitHub</a></span>
    <span>${m.location} · Open to remote &amp; hybrid · Last updated: March 22, 2026</span>`;
}

// ─── MAIN: fetch data.json, build everything ──────────────────
async function init() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error('data.json not found');
    const data = await res.json();

    // Update page title
    document.title = `${data.meta.name} — ${data.meta.role}`;

    // Build all sections
    $('hero-content').innerHTML     = buildHero(data);
    $('about-content').innerHTML    = buildAbout(data);
    $('impact-content').innerHTML   = buildImpact(data);
    $('services-content').innerHTML = buildServices(data);
    $('projects-content').innerHTML = buildProjects(data);
    $('experience-content').innerHTML = buildExperience(data);
    $('contact-content').innerHTML  = buildContact(data);
    $('footer-content').innerHTML   = buildFooter(data);

    // Start interactions after DOM is built
    initInteractions();

  } catch(err) {
    console.error('Failed to load data.json:', err);
    // Fallback: show error in hero
    $('hero-content').innerHTML = `<div style="padding:80px 0;text-align:center;color:var(--r)">
      <p style="font-family:var(--ff-mono);font-size:14px">Error loading data.json — ${err.message}</p>
    </div>`;
  } finally {
    // Hide loader
    setTimeout(()=>{ $('loader').classList.add('hide'); }, 900);
  }
}

// ─── INTERACTIONS (scroll reveal, counters, cursor, nav) ──────
function initInteractions() {

  // Cursor hover effect
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter',()=>{ ring.style.width='54px'; ring.style.height='54px'; ring.style.opacity='0.5'; });
    el.addEventListener('mouseleave',()=>{ ring.style.width='36px'; ring.style.height='36px'; ring.style.opacity='1'; });
  });

  // Scroll reveal
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('show'); });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  // Counter animation
  const cio = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const el = e.target;
      const target = +el.dataset.target;
      const suffix = el.dataset.suffix || '';
      if (!target) return;
      let s = 0; const step = target / 60;
      (function tick() { s = Math.min(s+step,target); el.textContent = Math.floor(s)+suffix; if(s<target) requestAnimationFrame(tick); })();
      cio.unobserve(el);
    });
  }, { threshold: 0.5 });
  document.querySelectorAll('[data-target]').forEach(el => cio.observe(el));

  // Active nav
  const secs = document.querySelectorAll('section[id]');
  const navAs = document.querySelectorAll('.nav-links a');
  window.addEventListener('scroll', () => {
    let c = '';
    secs.forEach(s => { if (window.scrollY >= s.offsetTop - 120) c = s.id; });
    navAs.forEach(a => { a.style.color = a.getAttribute('href') === '#'+c ? 'var(--g)' : ''; });
  }, { passive: true });
}

// ─── CONTACT FORM ─────────────────────────────────────────────
function handleForm(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.textContent = '✓ Sent!';
  btn.style.background = '#1a3d2b';
  btn.style.color = 'var(--g)';
  btn.disabled = true;
  setTimeout(() => {
    btn.textContent = 'Send Message →';
    btn.style.background = '';
    btn.style.color = '';
    btn.disabled = false;
    e.target.reset();
  }, 3000);
}

// Kick off
init();
</script>
